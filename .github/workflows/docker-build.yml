name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - dev
      - release/stable
    tags:
      - 'v*'
  # PR validation is handled by pr-docker-check.yml (build-only, no push).
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io

jobs:
  prepare:
    name: Prepare repository metadata
    runs-on: ubuntu-22.04
    outputs:
      image_base: ${{ steps.meta.outputs.image_base }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history is required so `git rev-list --count` yields the
          # monotonic commit count used as the image tag patch number.
          fetch-depth: 0

      - name: Compute image base and version
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Version = 1.0.<commit count>, e.g. 1.0.142.
          VERSION="1.0.$(git rev-list --count HEAD)"
          echo "image_base=${REPO_LOWER}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Image base: ${REPO_LOWER}"
          echo "Version:    ${VERSION}"

  build-and-push:
    name: Build ${{ matrix.name }} (${{ matrix.arch_tag }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: ./docker/Dockerfile.backend
            image_suffix: backend
            platform: linux/amd64
            arch_tag: amd64
            runner: ubuntu-22.04
          - name: backend
            dockerfile: ./docker/Dockerfile.backend
            image_suffix: backend
            platform: linux/arm64
            arch_tag: arm64
            runner: ubuntu-22.04-arm
          - name: frontend
            dockerfile: ./docker/Dockerfile.frontend
            image_suffix: frontend
            platform: linux/amd64
            arch_tag: amd64
            runner: ubuntu-22.04
          - name: frontend
            dockerfile: ./docker/Dockerfile.frontend
            image_suffix: frontend
            platform: linux/arm64
            arch_tag: arm64
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ needs.prepare.outputs.image_base }}/nofx-${{ matrix.image_suffix }}
            ${{ secrets.DOCKERHUB_USERNAME && format('{0}/nofx-{1}', secrets.DOCKERHUB_USERNAME, matrix.image_suffix) || '' }}
          # Tag each arch build with the commit-count build number; the manifest
          # job merges the per-arch images into the final 1.0.<count> version tag.
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}-${{ matrix.arch_tag }}

      - name: Build and push ${{ matrix.name }}-${{ matrix.arch_tag }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}-${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.arch_tag }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.prepare.outputs.version }}

      - name: Image digest
        run: |
          echo "✅ Built: ${{ matrix.name }}-${{ matrix.arch_tag }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  create-manifest:
    name: Create multi-arch manifests
    needs: [prepare, build-and-push]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image_suffix: [backend, frontend]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Create and push multi-arch manifest
        env:
          IMAGE_BASE: ${{ needs.prepare.outputs.image_base }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.version }}
        run: |
          GHCR_IMAGE="${{ env.REGISTRY_GHCR }}/${IMAGE_BASE}/nofx-${{ matrix.image_suffix }}"

          echo "📦 Creating manifest for ${{ matrix.image_suffix }} (build ${BUILD_NUMBER})"

          # Immutable per-build tag: 1.0.<git commit count>.
          docker buildx imagetools create -t "${GHCR_IMAGE}:${BUILD_NUMBER}" \
            "${GHCR_IMAGE}:${BUILD_NUMBER}-amd64" \
            "${GHCR_IMAGE}:${BUILD_NUMBER}-arm64"

          # Rolling tags per branch.
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker buildx imagetools create -t "${GHCR_IMAGE}:latest" \
              "${GHCR_IMAGE}:${BUILD_NUMBER}-amd64" \
              "${GHCR_IMAGE}:${BUILD_NUMBER}-arm64"
            echo "✅ Created latest tag (main branch only)"
          fi

          if [[ "${{ github.ref }}" == "refs/heads/release/stable" ]]; then
            docker buildx imagetools create -t "${GHCR_IMAGE}:stable" \
              "${GHCR_IMAGE}:${BUILD_NUMBER}-amd64" \
              "${GHCR_IMAGE}:${BUILD_NUMBER}-arm64"
            echo "✅ Created stable tag (release/stable branch)"
          fi

          if [[ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]]; then
            DOCKERHUB_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/nofx-${{ matrix.image_suffix }}"
            docker buildx imagetools create -t "${DOCKERHUB_IMAGE}:${BUILD_NUMBER}" \
              "${DOCKERHUB_IMAGE}:${BUILD_NUMBER}-amd64" \
              "${DOCKERHUB_IMAGE}:${BUILD_NUMBER}-arm64" || true
          fi

          echo "🎉 Manifest created: ${GHCR_IMAGE}:${BUILD_NUMBER}"
